<div class="container">
  <!-- AUTH SECTION -->
  <div *ngIf="!isLoggedIn" class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <div *ngIf="!showRegister">
        <input type="email" [(ngModel)]="loginData.email" placeholder="Email" class="form-input">
        <input type="password" [(ngModel)]="loginData.password" placeholder="Password" class="form-input">
        <button class="btn-primary" (click)="login()">Login</button>
        <p class="footer-text">No account? <span (click)="showRegister = true" class="link">Register here</span></p>
      </div>
      <div *ngIf="showRegister">
        <input type="text" [(ngModel)]="registerData.name" placeholder="Full Name" class="form-input">
        <input type="email" [(ngModel)]="registerData.email" placeholder="Email" class="form-input">
        <input type="password" [(ngModel)]="registerData.password" placeholder="Password" class="form-input">
        <button class="btn-primary" (click)="register()">Create Account</button>
        <p class="footer-text">Have account? <span (click)="showRegister = false" class="link">Login here</span></p>
      </div>
    </div>
  </div>

  <!-- MAIN APP CARD -->
  <div *ngIf="isLoggedIn" class="app-card">
    <header class="app-header">
      <div class="title-group">
        <h1>My Tasks</h1>
        <span class="badge">{{ remainingTasks }} remaining</span>
      </div>
      <button class="logout-btn" (click)="logout()">Logout</button>
    </header>

    <div class="input-section">
      <input type="text" placeholder="What needs to be done?" [(ngModel)]="newTask" (keyup.enter)="addTask()"/>
      <button class="add-btn" (click)="addTask()">Add</button>
    </div>

    <div class="main-scroll-area">
      <!-- ACTIVE TASKS -->
      <h3>{{ tasks.length > 0 ? 'Active Tasks' : 'No Active Tasks' }}</h3>
      <ul class="task-list-reset">
        <li *ngFor="let t of tasks; trackBy: trackByFn" class="task-item">
          <div class="task-info">
            <input type="checkbox" [(ngModel)]="t.done" (change)="toggleDone(t)" [disabled]="!!t.isEditing">
            <span *ngIf="!t.isEditing" class="task-text" [class.done]="t.done">{{ t.text }}</span>
            <textarea *ngIf="t.isEditing" [(ngModel)]="t.tempText" class="edit-mode-input" rows="2" (keyup.enter)="saveEdit(t)"></textarea>
          </div>
          <div class="button-group">
            <button *ngIf="!t.isEditing" class="btn-edit" (click)="startEdit(t)">Edit</button>
            <button *ngIf="t.isEditing" class="btn-save" (click)="saveEdit(t)">Save</button>
            <button class="btn-finish" (click)="moveToFinished(t)" [disabled]="!t.done">Finish</button>
            <button class="btn-delete" (click)="deleteTask(t)">Delete</button>
          </div>
        </li>
      </ul>

      <hr class="divider">

      <!-- HISTORY -->
      <div class="history-section">
        <div class="history-header">
            <h3>History</h3>
            <button class="btn-clear" (click)="clearHistory()" *ngIf="finishedTasks.length || deletedTasks.length">Clear History</button>
        </div>
        <div class="history-grid">
          <div class="history-col">
            <h4>Finished</h4>
            <ul class="history-list">
              <li *ngFor="let t of finishedTasks" class="history-item completed">
                <span class="symbol">✔</span> {{ t.text }}
              </li>
            </ul>
          </div>
          <div class="history-col">
            <h4>Deleted</h4>
            <ul class="history-list">
              <li *ngFor="let t of deletedTasks" class="history-item deleted">
                <span class="symbol">❌</span> {{ t.text }}
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
